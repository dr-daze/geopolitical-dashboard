## Source configuration for the geopolitical dashboard
# This YAML file lists the sources used for each signal stream. Each entry
# contains a `name` and may include a `rss` URL and a default `region`.
# When `rss` is null, the ingestion script will skip automatic scraping.

battlefield:
  - name: "Institute for the Study of War"
    rss: "https://www.understandingwar.org/rss.xml"
    region: "Global"
  - name: "Critical Threats Project"
    rss: "https://www.criticalthreats.org/feeds/all"
    region: "Middle East"
  - name: "Janes Defence"
    rss: null
    region: "Global"
  - name: "War on the Rocks"
    rss: "https://feeds.feedburner.com/WarOnTheRocks"
    region: "Global"
  - name: "Defense News"
    rss: "https://www.defensenews.com/arc/outboundfeeds/rss/?outputType=xml"
    region: "Global"
  - name: "The Kyiv Independent"
    rss: "https://kyivindependent.com/feed"
    region: "Russia-Ukraine"
  - name: "Haaretz Defense"
    rss: null
    region: "Israel-Iran"
  - name: "Al-Monitor"
    rss: null
    region: "Middle East"

escalation:
  - name: "RAND Corporation"
    rss: null
    region: "United States"
  - name: "CSIS"
    rss: null
    region: "NATO"
  - name: "Atlantic Council"
    rss: null
    region: "Global"
  - name: "IISS"
    rss: null
    region: "Global"
  - name: "Breaking Defense"
    rss: "https://breakingdefense.com/feed/"
    region: "United States"
  - name: "Politico Defense"
    rss: "https://www.politico.com/rss/politicodailydefense.xml"
    region: "NATO"
  - name: "Defense One"
    rss: "https://www.defenseone.com/feeds/all/"
    region: "United States"

proxy:
  - name: "Long War Journal"
    rss: "https://www.longwarjournal.org/feed"
    region: "Middle East"
  - name: "Critical Threats Project (Proxy)"
    rss: "https://www.criticalthreats.org/feeds/all"
    region: "Middle East"
  - name: "The Soufan Center"
    rss: null
    region: "Global"

energy_shock:
  - name: "Bloomberg Energy"
    rss: null
    region: "Global"
  - name: "S&P Global Commodity Insights"
    rss: null
    region: "Global"
  - name: "Argus Media"
    rss: null
    region: "Global"
  - name: "Energy Intelligence"
    rss: null
    region: "Global"

market_shock:
  - name: "Bloomberg Markets"
    rss: null
    region: "Global"
  - name: "Financial Times Markets"
    rss: null
    region: "Global"
  - name: "Wall Street Journal Markets"
    rss: null
    region: "United States"