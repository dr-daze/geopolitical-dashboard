<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geopolitical Intelligence Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Geopolitical Intelligence Dashboard</h1>
      <p id="update-info">Loading&hellip;</p>
      <div id="filters">
        <label>
          Category:
          <select id="category-select">
            <option value="">All</option>
            <option value="battlefield">Battlefield</option>
            <option value="escalation">Escalation</option>
            <option value="proxy">Proxy</option>
            <option value="energy_shock">Energy Shock</option>
            <option value="market_shock">Market Shock</option>
          </select>
        </label>
        <label>
          Region:
          <input type="text" id="region-input" placeholder="e.g. Russia-Ukraine" />
        </label>
      </div>
    </header>
    <main>
      <section id="battlefield-panel" class="panel">
        <h2>Battlefield Updates</h2>
        <ul class="list" id="battlefield-list"></ul>
      </section>
      <section id="escalation-panel" class="panel">
        <h2>Escalation Signals</h2>
        <ul class="list" id="escalation-list"></ul>
      </section>
      <section id="energy-panel" class="panel">
        <h2>Energy Shock Monitor</h2>
        <ul class="list" id="energy-list"></ul>
      </section>
      <section id="market-panel" class="panel">
        <h2>Financial Stress Indicators</h2>
        <ul class="list" id="market-list"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
