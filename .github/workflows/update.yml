name: Update data

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pyyaml yfinance

      - name: Fetch sources
        run: python scripts/fetch_sources.py

      - name: Classify signals
        run: python scripts/classify_signals.py

      - name: Fetch markets
        run: python scripts/fetch_markets.py

      - name: Copy data into docs
        run: |
          mkdir -p docs/data
          cp data/news.json docs/data/news.json
          cp data/markets.json docs/data/markets.json
          cp data/status.json docs/data/status.json

      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated intelligence update"
          file_pattern: data/*.json docs/data/*.json
